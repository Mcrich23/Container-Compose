name: Tests

on:
  # Manual trigger only - run via workflow_dispatch
  workflow_dispatch:
  # Required status check for PRs (but doesn't auto-run on commits)
  push:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/tests.yml'

jobs:
  test:
    name: Run Swift Static Tests
    runs-on: macos-26
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Swift
      uses: swift-actions/setup-swift@v3

    - name: Ensure jq is installed
      run: |
        if ! command -v jq >/dev/null 2>&1; then
          brew install jq
        fi

    - name: Download latest Container installer
      run: |
        curl -s https://api.github.com/repos/apple/container/releases/latest \
          | jq -r '.assets[] | select(.name | endswith("-installer-signed.pkg")) | .browser_download_url' \
          | xargs -I{} curl -L "{}" -o container-latest-installer-signed.pkg

    - name: Install Container package
      run: sudo installer -pkg container-latest-installer-signed.pkg -target /

    - name: Start container system
      run: container system start
    
    - name: Build
      run: swift build --build-tests
      
    - name: Run tests
      run: swift test

    - name: Upload static test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: .build/debug/*.xctest
        if-no-files-found: ignore
